name: "CLI Validation"

# Runs on every push and pull request to active branches.
# No build required — tests run in dev mode.
on:
  push:
    branches: [ v4.5, main, master, develop, WXMigration, feature/video-description ]
    paths:
      - 'cli/**'
      - 'idt_core/**'
      - 'idt/idt_cli.py'
      - 'scripts/**'
      - 'analysis/**'
      - 'models/**'
      - 'pytest_tests/**'
      - '.github/workflows/cli-validation.yml'
  pull_request:
    branches: [ v4.5, main, master, develop, WXMigration, feature/video-description ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cli-validation:
    name: "IDT CLI Validation"
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      # ------------------------------------------------------------------ #
      #  1. Checkout + Python                                                #
      # ------------------------------------------------------------------ #
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        shell: pwsh

      # ------------------------------------------------------------------ #
      #  2. Syntax validation                                                #
      # ------------------------------------------------------------------ #
      - name: Syntax-check new CLI (cli/)
        run: |
          python -m py_compile cli/main.py
          python -m py_compile cli/guide.py
        shell: pwsh

      - name: Syntax-check idt_core
        run: |
          $files = Get-ChildItem idt_core\*.py
          foreach ($f in $files) {
            python -m py_compile $f.FullName
            if ($LASTEXITCODE -ne 0) {
              Write-Host "SYNTAX ERROR in $($f.Name)"
              exit 1
            }
          }
        shell: pwsh

      - name: Syntax-check legacy idt_cli.py
        run: python -m py_compile idt/idt_cli.py
        shell: pwsh

      - name: Syntax-check scripts
        run: |
          $files = Get-ChildItem scripts\*.py | Where-Object { $_.Name -notmatch 'llamado' }
          foreach ($f in $files) {
            python -m py_compile $f.FullName
            if ($LASTEXITCODE -ne 0) {
              Write-Host "SYNTAX ERROR in $($f.Name)"
              exit 1
            }
          }
        shell: pwsh

      # ------------------------------------------------------------------ #
      #  3. New CLI smoke test — verify all commands are reachable           #
      # ------------------------------------------------------------------ #
      - name: New CLI help contract
        run: |
          $cmds = @('describe','export','status','show','embed','video','download','combine','stats','models','prompts','config','guideme')
          foreach ($cmd in $cmds) {
            Write-Host "--- idt $cmd --help ---"
            python cli/main.py $cmd --help
            if ($LASTEXITCODE -ne 0) {
              Write-Host "ERROR: 'idt $cmd --help' returned exit code $LASTEXITCODE"
              exit 1
            }
          }
        shell: pwsh
        env:
          IDT_QUIET_CONFIG_LOG: "1"

      # ------------------------------------------------------------------ #
      #  4. idt_core unit tests                                              #
      # ------------------------------------------------------------------ #
      - name: Run idt_core unit tests
        run: |
          python -m pytest pytest_tests/unit/test_idt_core.py -v --tb=short
        shell: pwsh
        env:
          IDT_QUIET_CONFIG_LOG: "1"

      # ------------------------------------------------------------------ #
      #  5. Legacy CLI integration tests (old idt_cli.py still shipped)     #
      # ------------------------------------------------------------------ #
      - name: Run legacy IDT CLI integration tests
        run: |
          python -m pytest pytest_tests/integration/test_idt_cli.py -v --tb=short
        shell: pwsh
        env:
          IDT_QUIET_CONFIG_LOG: "1"

      # ------------------------------------------------------------------ #
      #  6. Smoke tests (GUI-dependent; non-fatal)                          #
      # ------------------------------------------------------------------ #
      - name: Run smoke tests
        run: |
          python -m pytest pytest_tests/smoke/ -v --tb=short
        shell: pwsh
        continue-on-error: true

      # ------------------------------------------------------------------ #
      #  7. Summary                                                          #
      # ------------------------------------------------------------------ #
      - name: Test summary
        if: always()
        run: |
          Write-Host ""
          Write-Host "=== CLI Validation complete ==="
          Write-Host "New CLI (cli/main.py), idt_core unit tests, and legacy CLI tests ran."
        shell: pwsh
