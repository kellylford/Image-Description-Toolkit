name: "CLI Validation"

# Runs on every push and pull request to active branches.
# No build required — tests run in dev mode.
on:
  push:
    branches: [ v4.5, main ]
    paths:
      - 'cli/**'
      - 'idt_core/**'
      - 'pytest_tests/**'
      - '.github/workflows/cli-validation.yml'
  pull_request:
    branches: [ v4.5, main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cli-validation:
    name: "IDT CLI Validation"
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      # ------------------------------------------------------------------ #
      #  1. Checkout + Python                                                #
      # ------------------------------------------------------------------ #
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        shell: pwsh

      # ------------------------------------------------------------------ #
      #  2. Syntax validation                                                #
      # ------------------------------------------------------------------ #
      - name: Syntax-check CLI (cli/)
        run: |
          python -m py_compile cli/main.py
          python -m py_compile cli/guide.py
        shell: pwsh

      - name: Syntax-check idt_core
        run: |
          $files = Get-ChildItem idt_core\*.py
          foreach ($f in $files) {
            python -m py_compile $f.FullName
            if ($LASTEXITCODE -ne 0) {
              Write-Host "SYNTAX ERROR in $($f.Name)"
              exit 1
            }
          }
        shell: pwsh

      # ------------------------------------------------------------------ #
      #  3. CLI smoke test — verify all commands are reachable               #
      # ------------------------------------------------------------------ #
      - name: CLI help contract
        run: |
          $cmds = @('describe','export','status','show','embed','video','download','combine','stats','models','prompts','config','guideme')
          foreach ($cmd in $cmds) {
            Write-Host "--- idt $cmd --help ---"
            python cli/main.py $cmd --help
            if ($LASTEXITCODE -ne 0) {
              Write-Host "ERROR: 'idt $cmd --help' returned exit code $LASTEXITCODE"
              exit 1
            }
          }
        shell: pwsh
        env:
          IDT_QUIET_CONFIG_LOG: "1"

      # ------------------------------------------------------------------ #
      #  4. idt_core unit tests                                              #
      # ------------------------------------------------------------------ #
      - name: Run idt_core unit tests
        run: |
          python -m pytest pytest_tests/unit/test_idt_core.py -v --tb=short
        shell: pwsh
        env:
          IDT_QUIET_CONFIG_LOG: "1"

      # ------------------------------------------------------------------ #
      #  5. Smoke tests (GUI-dependent; non-fatal)                          #
      # ------------------------------------------------------------------ #
      - name: Run smoke tests
        run: |
          python -m pytest pytest_tests/smoke/ -v --tb=short
        shell: pwsh
        continue-on-error: true

      # ------------------------------------------------------------------ #
      #  6. Summary                                                          #
      # ------------------------------------------------------------------ #
      - name: Test summary
        if: always()
        run: |
          Write-Host ""
          Write-Host "=== CLI Validation complete ==="
          Write-Host "CLI (cli/main.py) and idt_core unit tests ran."
        shell: pwsh
