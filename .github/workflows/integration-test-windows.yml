name: "Integration Test: Windows (Ollama + moondream)"

# Runs automatically on every push to v4.5 and main.
# Manual trigger also available via workflow_dispatch.
on:
  workflow_dispatch:
  push:
    branches:
      - v4.5
      - main
      - feature/video-description

jobs:
  integration-test:
    runs-on: windows-latest
    timeout-minutes: 60  # Model pull can be slow on first run

    steps:
    # ------------------------------------------------------------------ #
    #  1. Checkout + Python                                                #
    # ------------------------------------------------------------------ #
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # ------------------------------------------------------------------ #
    #  2. Build both executables                                           #
    # ------------------------------------------------------------------ #
    - name: Build all Windows apps
      run: |
        cd BuildAndRelease\WinBuilds
        call builditall_wx.bat
      shell: cmd

    - name: Verify build outputs exist
      shell: pwsh
      run: |
        $missing = @()
        if (-not (Test-Path "idt\dist\idt.exe"))                       { $missing += "idt\dist\idt.exe" }
        if (-not (Test-Path "imagedescriber\dist\ImageDescriber.exe")) { $missing += "imagedescriber\dist\ImageDescriber.exe" }
        if ($missing.Count -gt 0) {
          Write-Host "ERROR: Expected build outputs not found:"
          $missing | ForEach-Object { Write-Host "  - $_" }
          exit 1
        }
        Write-Host "Build outputs confirmed:"
        Write-Host "  idt.exe              $(((Get-Item 'idt\dist\idt.exe').Length / 1MB).ToString('0.0')) MB"
        Write-Host "  ImageDescriber.exe   $(((Get-Item 'imagedescriber\dist\ImageDescriber.exe').Length / 1MB).ToString('0.0')) MB"

    # ------------------------------------------------------------------ #
    #  3. Install Ollama via winget                                        #
    # ------------------------------------------------------------------ #
    - name: Install Ollama via winget
      shell: pwsh
      run: |
        Write-Host "Installing Ollama..."
        winget install Ollama.Ollama --silent --accept-package-agreements --accept-source-agreements

        # Reload PATH from registry -- winget installs don't update the current shell
        $machinePath = [System.Environment]::GetEnvironmentVariable('PATH', 'Machine')
        $userPath    = [System.Environment]::GetEnvironmentVariable('PATH', 'User')
        $env:PATH    = "$machinePath;$userPath"

        # If `ollama` still isn't found, search common install locations
        if (-not (Get-Command ollama -ErrorAction SilentlyContinue)) {
          Write-Host "ollama not in refreshed PATH -- searching common install locations..."
          $candidates = @(
            "$env:LOCALAPPDATA\Programs\Ollama",
            "$env:PROGRAMFILES\Ollama",
            "$env:PROGRAMFILES(X86)\Ollama"
          )
          $found = $false
          foreach ($dir in $candidates) {
            if (Test-Path "$dir\ollama.exe") {
              Write-Host "Found at: $dir"
              Add-Content $env:GITHUB_PATH $dir
              $env:PATH = "$env:PATH;$dir"
              $found = $true
              break
            }
          }
          if (-not $found) {
            Write-Host "ERROR: Could not locate ollama.exe after install"
            exit 1
          }
        } else {
          $ollamaDir = (Get-Command ollama).Source | Split-Path
          Add-Content $env:GITHUB_PATH $ollamaDir
        }

        Write-Host "Ollama version:"
        ollama --version

    # ------------------------------------------------------------------ #
    #  4. Pull moondream (the default IDT model)                          #
    # ------------------------------------------------------------------ #
    - name: Pull moondream model
      shell: pwsh
      run: |
        Write-Host "Pulling moondream -- may take a few minutes on first run..."
        ollama pull moondream
        Write-Host ""
        Write-Host "--- Installed models ---"
        ollama list

    # ------------------------------------------------------------------ #
    #  5. Verify Ollama server is ready                                    #
    # ------------------------------------------------------------------ #
    - name: Verify Ollama server is ready
      shell: pwsh
      run: |
        Write-Host "Waiting for Ollama server (auto-started by 'ollama pull')..."
        $maxAttempts = 10
        for ($i = 1; $i -le $maxAttempts; $i++) {
          try {
            $r = Invoke-RestMethod -Uri "http://localhost:11434" -TimeoutSec 3
            Write-Host "Ollama server is ready (attempt $i)"
            break
          } catch {
            if ($i -eq $maxAttempts) {
              Write-Host "ERROR: Ollama server did not respond after $maxAttempts attempts"
              exit 1
            }
            Write-Host "Attempt $i/$maxAttempts - waiting 3 s..."
            Start-Sleep -Seconds 3
          }
        }

    # ------------------------------------------------------------------ #
    #  6. Run idt describe on testimages/                                  #
    #     This auto-extracts video frames, describes all images+frames,   #
    #     and generates an HTML report in testimages.idtw/reports/.        #
    # ------------------------------------------------------------------ #
    - name: Run idt describe with moondream
      shell: pwsh
      run: |
        Write-Host "Running: idt.exe describe testimages --provider ollama --model moondream"
        Write-Host ""
        .\idt\dist\idt.exe describe testimages --provider ollama --model moondream
        $exitCode = $LASTEXITCODE
        Write-Host ""
        Write-Host "idt describe exit code: $exitCode"
        if ($exitCode -ne 0) {
          Write-Host "ERROR: idt describe command failed"
          exit $exitCode
        }

    # ------------------------------------------------------------------ #
    #  7. Verify workspace bundle was created                              #
    # ------------------------------------------------------------------ #
    - name: Verify workspace bundle structure
      shell: pwsh
      run: |
        $wsPath = "testimages.idtw"
        if (-not (Test-Path $wsPath)) {
          Write-Host "ERROR: Workspace bundle not created at $wsPath"
          exit 1
        }
        Write-Host "Workspace bundle: $wsPath"
        Write-Host ""
        Write-Host "--- Bundle contents ---"
        Get-ChildItem -Path $wsPath -Recurse -Depth 3 | ForEach-Object {
          Write-Host "  $($_.FullName.Replace((Resolve-Path $wsPath).Path,'').TrimStart('\'))"
        }

    # ------------------------------------------------------------------ #
    #  8. Verify HTML report was generated                                 #
    # ------------------------------------------------------------------ #
    - name: Verify HTML report and descriptions
      shell: pwsh
      run: |
        $htmlPath = "testimages.idtw\reports\descriptions.html"
        if (-not (Test-Path $htmlPath)) {
          Write-Host "ERROR: HTML report not found at $htmlPath"
          exit 1
        }
        $content = Get-Content $htmlPath -Raw
        Write-Host "HTML report size: $($content.Length) chars"

        # Require at least one image entry
        $imageEntries = ([regex]::Matches($content, '<article')).Count
        Write-Host "Image entries in HTML: $imageEntries"
        if ($imageEntries -lt 1) {
          Write-Host "ERROR: No image entries found in HTML report"
          exit 1
        }

        # Check for meaningful description content
        $sceneWords = @('sky','grass','sun','cloud','tree','outdoor','green','coffee','cup','notebook','desk','circle','square','blue','red','frame','image','scene')
        $matched = $sceneWords | Where-Object { $content -imatch "\b$_\b" }
        Write-Host "Scene words found: $($matched -join ', ')"
        if ($matched.Count -eq 0) {
          Write-Host "ERROR: HTML report contains none of the expected scene words"
          exit 1
        }

        Write-Host "PASS: HTML report generated with $imageEntries image entries and meaningful content"

    # ------------------------------------------------------------------ #
    #  9. Verify video frames were extracted                               #
    #     test_video.mp4 at 5-second intervals → at least 1 frame         #
    # ------------------------------------------------------------------ #
    - name: Verify committed test video exists
      shell: pwsh
      run: |
        if (-not (Test-Path "testimages/test_video.mp4")) {
          Write-Host "WARNING: testimages/test_video.mp4 not found -- video extraction test skipped"
        } else {
          $size = (Get-Item "testimages/test_video.mp4").Length
          Write-Host "Test video: testimages/test_video.mp4 ($size bytes)"
        }

    - name: Verify video frames in workspace
      shell: pwsh
      run: |
        if (-not (Test-Path "testimages/test_video.mp4")) {
          Write-Host "No test video present -- skipping frame verification"
          exit 0
        }

        # Frames go to testimages.idtw\derived\frames\<video_stem>\
        $framesDir = "testimages.idtw\derived\frames"
        if (-not (Test-Path $framesDir)) {
          Write-Host "ERROR: No derived/frames directory found in workspace"
          Write-Host "Expected: $framesDir"
          exit 1
        }

        $frames = Get-ChildItem -Path $framesDir -Filter "*.jpg" -Recurse -ErrorAction SilentlyContinue
        Write-Host "Video frames extracted: $($frames.Count)"
        $frames | Select-Object -First 10 | ForEach-Object { Write-Host "  $($_.Name)  ($($_.Length) bytes)" }

        if ($frames.Count -lt 1) {
          Write-Host "ERROR: No video frames found under $framesDir"
          exit 1
        }
        Write-Host "PASS: $($frames.Count) video frame(s) extracted"

    # ------------------------------------------------------------------ #
    # 10. idt status — quick sanity check on the workspace                 #
    # ------------------------------------------------------------------ #
    - name: Run idt status on workspace
      shell: pwsh
      run: |
        Write-Host "Running: idt.exe status testimages"
        .\idt\dist\idt.exe status testimages
        if ($LASTEXITCODE -ne 0) {
          Write-Host "WARNING: idt status returned $LASTEXITCODE"
        }

    # ------------------------------------------------------------------ #
    # 11. Bonus: ImageDescriber launch smoke test                          #
    # ------------------------------------------------------------------ #
    - name: Smoke test - ImageDescriber launches without crashing
      continue-on-error: true
      shell: pwsh
      run: |
        Write-Host "Launching ImageDescriber.exe (15-second survival test)..."
        $proc = Start-Process -FilePath ".\imagedescriber\dist\ImageDescriber.exe" -PassThru
        Start-Sleep -Seconds 15

        if ($proc.HasExited) {
          Write-Host "FAIL: ImageDescriber.exe exited within 15 seconds (exit code $($proc.ExitCode))"
          exit 1
        }

        Write-Host "PASS: ImageDescriber.exe is still running after 15 seconds (PID $($proc.Id))"
        $proc.Kill()
        Write-Host "Process terminated cleanly."

    # ------------------------------------------------------------------ #
    # 12. Upload artifacts                                                  #
    # ------------------------------------------------------------------ #
    - name: Upload idt executable
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: idt-windows
        path: idt/dist/idt.exe
        retention-days: 14

    - name: Upload ImageDescriber executable
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: imagedescriber-windows
        path: imagedescriber/dist/ImageDescriber.exe
        retention-days: 14

    - name: Upload workspace bundle (descriptions + report)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: workspace-output
        path: testimages.idtw/
        retention-days: 14
        if-no-files-found: warn
