name: "Integration Test: Windows (Ollama + moondream)"

# Manual trigger only -- Ollama model pull + inference takes ~20-30 min.
# Run this when you want to verify the full end-to-end user flow works.
# Public repo = free GitHub Actions minutes on windows-latest.
on:
  workflow_dispatch:

jobs:
  integration-test:
    runs-on: windows-latest
    timeout-minutes: 60  # Model pull can be slow on first run

    steps:
    # ------------------------------------------------------------------ #
    #  1. Checkout + Python                                                #
    # ------------------------------------------------------------------ #
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # ------------------------------------------------------------------ #
    #  2. Build both executables (same bat as the build workflow)          #
    # ------------------------------------------------------------------ #
    - name: Build all Windows apps
      run: |
        cd BuildAndRelease\WinBuilds
        call builditall_wx.bat
      shell: cmd

    - name: Verify build outputs exist
      shell: pwsh
      run: |
        $missing = @()
        if (-not (Test-Path "idt\dist\idt.exe"))                       { $missing += "idt\dist\idt.exe" }
        if (-not (Test-Path "imagedescriber\dist\ImageDescriber.exe")) { $missing += "imagedescriber\dist\ImageDescriber.exe" }
        if ($missing.Count -gt 0) {
          Write-Host "ERROR: Expected build outputs not found:"
          $missing | ForEach-Object { Write-Host "  - $_" }
          exit 1
        }
        Write-Host "Build outputs confirmed:"
        Write-Host "  idt.exe              $(((Get-Item 'idt\dist\idt.exe').Length / 1MB).ToString('0.0')) MB"
        Write-Host "  ImageDescriber.exe   $(((Get-Item 'imagedescriber\dist\ImageDescriber.exe').Length / 1MB).ToString('0.0')) MB"

    # ------------------------------------------------------------------ #
    #  3. Install Ollama via winget                                        #
    # ------------------------------------------------------------------ #
    - name: Install Ollama via winget
      shell: pwsh
      run: |
        Write-Host "Installing Ollama..."
        winget install Ollama.Ollama --silent --accept-package-agreements --accept-source-agreements

        # Reload PATH from registry -- winget installs don't update the current shell
        $machinePath = [System.Environment]::GetEnvironmentVariable('PATH', 'Machine')
        $userPath    = [System.Environment]::GetEnvironmentVariable('PATH', 'User')
        $env:PATH    = "$machinePath;$userPath"

        # If `ollama` still isn't found, search common install locations
        if (-not (Get-Command ollama -ErrorAction SilentlyContinue)) {
          Write-Host "ollama not in refreshed PATH -- searching common install locations..."
          $candidates = @(
            "$env:LOCALAPPDATA\Programs\Ollama",
            "$env:PROGRAMFILES\Ollama",
            "$env:PROGRAMFILES(X86)\Ollama"
          )
          $found = $false
          foreach ($dir in $candidates) {
            if (Test-Path "$dir\ollama.exe") {
              Write-Host "Found at: $dir"
              Add-Content $env:GITHUB_PATH $dir
              $env:PATH = "$env:PATH;$dir"
              $found = $true
              break
            }
          }
          if (-not $found) {
            Write-Host "ERROR: Could not locate ollama.exe after install"
            exit 1
          }
        } else {
          # Already in PATH -- still register the dir via GITHUB_PATH for later steps
          $ollamaDir = (Get-Command ollama).Source | Split-Path
          Add-Content $env:GITHUB_PATH $ollamaDir
        }

        Write-Host "Ollama version:"
        ollama --version

    # ------------------------------------------------------------------ #
    #  4. Pull moondream (~1.7 GB -- the default idt workflow model)       #
    # ------------------------------------------------------------------ #
    - name: Pull moondream model
      shell: pwsh
      run: |
        Write-Host "Pulling moondream -- may take a few minutes on first run..."
        ollama pull moondream
        Write-Host ""
        Write-Host "--- Installed models ---"
        ollama list

    # ------------------------------------------------------------------ #
    #  5. Verify Ollama server is running                                  #
    #     `ollama pull` auto-starts the server as a side effect, so we    #
    #     just confirm it is listening before running idt.                 #
    # ------------------------------------------------------------------ #
    - name: Verify Ollama server is ready
      shell: pwsh
      run: |
        Write-Host "Waiting for Ollama server (auto-started by `ollama pull`)..."
        $maxAttempts = 10
        for ($i = 1; $i -le $maxAttempts; $i++) {
          try {
            $r = Invoke-RestMethod -Uri "http://localhost:11434" -TimeoutSec 3
            Write-Host "Ollama server is ready (attempt $i)"
            break
          } catch {
            if ($i -eq $maxAttempts) {
              Write-Host "ERROR: Ollama server did not respond after $maxAttempts attempts"
              exit 1
            }
            Write-Host "Attempt $i/$maxAttempts - waiting 3 s..."
            Start-Sleep -Seconds 3
          }
        }

    # ------------------------------------------------------------------ #
    #  6. Run the real user command                                        #
    #     testimages/ has blue_circle.jpg and red_square.jpg (committed)  #
    # ------------------------------------------------------------------ #
    - name: Run idt workflow with moondream
      shell: pwsh
      run: |
        Write-Host "Running: idt.exe workflow testimages --provider ollama --model moondream"
        Write-Host ""
        .\idt\dist\idt.exe workflow testimages --provider ollama --model moondream
        $exitCode = $LASTEXITCODE
        Write-Host ""
        Write-Host "idt workflow exit code: $exitCode"
        if ($exitCode -ne 0) {
          Write-Host "ERROR: idt workflow command failed"
          exit $exitCode
        }

    # ------------------------------------------------------------------ #
    #  7. Verify descriptions were actually produced (strict)              #
    # ------------------------------------------------------------------ #
    - name: Verify description output
      shell: pwsh
      run: |
        # idt workflow defaults to --output-dir Descriptions, so wf_* dirs land under Descriptions\
        $wfDirs = Get-ChildItem -Path "Descriptions" -Directory -Filter "wf_*" -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending
        if ($wfDirs.Count -eq 0) {
          Write-Host "ERROR: No workflow output directory found under Descriptions\\"
          Write-Host "Contents of current directory:"
          Get-ChildItem -Recurse -Depth 2 | Select-Object FullName
          exit 1
        }

        $wfDir = $wfDirs[0].FullName
        Write-Host "Workflow output directory: $wfDir"
        Write-Host ""
        Write-Host "--- Directory contents ---"
        Get-ChildItem -Path $wfDir -Recurse | ForEach-Object {
          Write-Host "  $($_.FullName.Replace($wfDir,'').TrimStart('\'))"
        }
        Write-Host ""

        # Check the combined descriptions file has at least 1 image described
        $descFile = Get-ChildItem -Path $wfDir -Filter "image_descriptions.txt" -Recurse | Select-Object -First 1
        if (-not $descFile) {
          Write-Host "ERROR: image_descriptions.txt not found in output directory"
          exit 1
        }

        $content = Get-Content $descFile.FullName -Raw
        Write-Host "=== image_descriptions.txt ==="
        Write-Host $content
        Write-Host "=============================="

        # Require at least one image block in the descriptions file
        # The file format uses "File: <name>" headers for each image entry
        $imageBlocks = ([regex]::Matches($content, '(?m)^File:')).Count
        Write-Host "Image description blocks found: $imageBlocks"
        if ($imageBlocks -lt 1) {
          Write-Host "ERROR: No image descriptions found in image_descriptions.txt"
          exit 1
        }

        # Verify actual description content -- test images are outdoor_scene.jpg (sky, grass, tree, sun)
        # and coffee_desk.jpg (coffee cup, notebook, desk).
        # At least one meaningful scene word should appear in the AI output.
        $sceneWords = @('sky','grass','sun','cloud','tree','outdoor','green','coffee','cup','notebook','desk','pen','table','wood')
        $matched = $sceneWords | Where-Object { $content -imatch "\b$_\b" }
        Write-Host "Scene words found: $($matched -join ', ')"
        if ($matched.Count -eq 0) {
          Write-Host "ERROR: Description text contains none of the expected scene words - likely an empty/error response"
          Write-Host "Expected one of: $($sceneWords -join ', ')"
          exit 1
        }

        Write-Host ""
        Write-Host "PASS: $imageBlocks image description(s) produced with meaningful content"

    # ------------------------------------------------------------------ #
    #  8. Video frame extraction test                                      #
    #     ffmpeg is NOT pre-installed on windows-latest; install via      #
    #     Chocolatey, then regenerate the test video fresh each run.      #
    #     Two color segments give scene detection a real cut to find.     #
    #     Both time-interval and scene-change modes are exercised.        #
    # ------------------------------------------------------------------ #
    - name: Install ffmpeg
      shell: pwsh
      run: |
        Write-Host "Installing ffmpeg via Chocolatey..."
        choco install ffmpeg --no-progress -y
        # Reload PATH so ffmpeg is visible in subsequent steps
        $machinePath = [System.Environment]::GetEnvironmentVariable('PATH', 'Machine')
        $userPath    = [System.Environment]::GetEnvironmentVariable('PATH', 'User')
        $env:PATH    = "$machinePath;$userPath"
        Add-Content $env:GITHUB_PATH "C:\ProgramData\chocolatey\bin"
        Write-Host "ffmpeg version: $(ffmpeg -version 2>&1 | Select-String 'ffmpeg version')"

    - name: Generate synthetic test video
      shell: pwsh
      run: |
        # Build a 10-second video with three solid-color segments:
        #   0-3 s  → black  (0x000000)
        #   3-7 s  → white  (0xffffff)
        #   7-10 s → black  (0x000000)
        # Two hard cuts (black→white at 3s and white→black at 7s) give
        # scene-change detection two triggers to find, ensuring even the
        # basic grayscale detector returns ≥ 2 frames.
        # Black/white have maximum grayscale contrast (0 vs 255) so both
        # the basic (pixel diff > 30) and enhanced detectors fire reliably.
        # Rate = 5 fps, 320x240 keeps the file under ~5 KB.
        Write-Host "Generating testimages/test_video.mp4 (black 0-3s / white 3-7s / black 7-10s) ..."

        ffmpeg -y `
          -f lavfi -i "color=c=0x000000:s=320x240:rate=5:duration=3" `
          -f lavfi -i "color=c=0xffffff:s=320x240:rate=5:duration=4" `
          -f lavfi -i "color=c=0x000000:s=320x240:rate=5:duration=3" `
          -filter_complex "[0:v][1:v][2:v]concat=n=3:v=1[out]" `
          -map "[out]" -c:v libx264 -preset ultrafast -pix_fmt yuv420p `
          testimages/test_video.mp4

        if ($LASTEXITCODE -ne 0) {
          Write-Host "ERROR: ffmpeg failed to generate test video"
          exit 1
        }
        $size = (Get-Item "testimages/test_video.mp4").Length
        Write-Host "Test video created: testimages/test_video.mp4 ($size bytes)"

    - name: "Extract frames - time interval mode (every 2 s)"
      shell: pwsh
      run: |
        Write-Host "Running: idt.exe extract-frames testimages/test_video.mp4 --output-dir frames_time --time 2"
        .\idt\dist\idt.exe extract-frames testimages/test_video.mp4 --output-dir frames_time --time 2
        $exitCode = $LASTEXITCODE
        Write-Host "exit code: $exitCode"
        if ($exitCode -ne 0) {
          Write-Host "ERROR: extract-frames (time interval) failed"
          exit $exitCode
        }

    - name: "Verify time-interval frames"
      shell: pwsh
      run: |
        $frames = Get-ChildItem -Path "frames_time" -Filter "*.jpg" -Recurse -ErrorAction SilentlyContinue
        Write-Host "Time-interval frames found: $($frames.Count)"
        $frames | ForEach-Object { Write-Host "  $($_.Name)  ($($_.Length) bytes)" }

        # 10-second video sampled every 2 seconds → at least 4 frames
        if ($frames.Count -lt 4) {
          Write-Host "ERROR: Expected at least 4 frames from time-interval mode, got $($frames.Count)"
          Get-ChildItem -Path "frames_time" -Recurse | Select-Object FullName, Length
          exit 1
        }
        Write-Host "PASS: $($frames.Count) frame(s) - time interval mode"

    - name: "Extract frames - scene change detection mode"
      shell: pwsh
      run: |
        # Threshold 30 = detect cuts where pixel difference exceeds 30%.
        # The blue→orange hard cut should easily exceed this.
        Write-Host "Running: idt.exe extract-frames testimages/test_video.mp4 --output-dir frames_scene --scene 30"
        .\idt\dist\idt.exe extract-frames testimages/test_video.mp4 --output-dir frames_scene --scene 30
        $exitCode = $LASTEXITCODE
        Write-Host "exit code: $exitCode"
        if ($exitCode -ne 0) {
          Write-Host "ERROR: extract-frames (scene change) failed"
          exit $exitCode
        }

    - name: "Verify scene-change frames"
      shell: pwsh
      run: |
        $frames = Get-ChildItem -Path "frames_scene" -Filter "*.jpg" -Recurse -ErrorAction SilentlyContinue
        Write-Host "Scene-change frames found: $($frames.Count)"
        $frames | ForEach-Object { Write-Host "  $($_.Name)  ($($_.Length) bytes)" }

        # There is exactly one hard cut (blue→orange at 5 s), so we expect
        # at least 2 frames (one per scene) but allow a few boundary frames.
        if ($frames.Count -lt 2) {
          Write-Host "ERROR: Expected at least 2 frames from scene-change mode, got $($frames.Count)"
          Get-ChildItem -Path "frames_scene" -Recurse | Select-Object FullName, Length
          exit 1
        }
        Write-Host "PASS: $($frames.Count) frame(s) - scene change mode"

    # ------------------------------------------------------------------ #
    #  9. Bonus: ImageDescriber launch smoke test                          #
    #     continue-on-error so a runner/GUI issue doesn't fail the core   #
    # ------------------------------------------------------------------ #
    - name: Smoke test - ImageDescriber launches without crashing
      continue-on-error: true
      shell: pwsh
      run: |
        Write-Host "Launching ImageDescriber.exe (15-second survival test)..."
        $proc = Start-Process -FilePath ".\imagedescriber\dist\ImageDescriber.exe" -PassThru
        Start-Sleep -Seconds 15

        if ($proc.HasExited) {
          Write-Host "FAIL: ImageDescriber.exe exited within 15 seconds (exit code $($proc.ExitCode))"
          Write-Host "Likely a missing PyInstaller dependency or import error."
          exit 1
        }

        Write-Host "PASS: ImageDescriber.exe is still running after 15 seconds (PID $($proc.Id))"
        $proc.Kill()
        Write-Host "Process terminated cleanly."

    # ------------------------------------------------------------------ #
    # 10. Upload artifacts (always -- so you get outputs even on failure)  #
    # ------------------------------------------------------------------ #
    - name: Upload idt executable
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: idt-windows
        path: idt/dist/idt.exe
        retention-days: 14

    - name: Upload ImageDescriber executable
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: imagedescriber-windows
        path: imagedescriber/dist/ImageDescriber.exe
        retention-days: 14

    - name: Upload workflow output (moondream descriptions)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: workflow-output
        path: Descriptions/wf_*/
        retention-days: 14
        if-no-files-found: warn

    - name: Upload extracted video frames
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: video-frames-output
        path: |
          frames_time/
          frames_scene/
        retention-days: 14
        if-no-files-found: warn
